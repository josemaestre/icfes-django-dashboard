{% load static subscription_tags %}

<!-- Modal de Upgrade simplificado -->
<div class="modal fade" id="upgradeModal" tabindex="-1" aria-labelledby="upgradeModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header border-0 pb-0">
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body text-center py-4">
                <i class="bx bx-lock-open display-1 text-primary mb-3"></i>
                <h3 class="fw-bold">Desbloquea el Nivel Pro</h3>
                <p class="text-muted mb-4">
                    Para acceder a métricas avanzadas, históricos desde 1996, clustering de colegios idénticos y exportaciones en Excel necesitas un Plan Pro Estratégico.
                </p>
                <a href="{% url 'pages:pricing' %}" class="btn btn-primary w-100 btn-lg mb-2">
                    <i class="bx bx-rocket me-1"></i> Ver Planes y Precios
                </a>
                <button type="button" class="btn btn-light w-100" data-bs-dismiss="modal">
                    En otro momento
                </button>
            </div>
        </div>
    </div>
</div>
